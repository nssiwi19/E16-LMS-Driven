version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-e16_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-e16_lms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-e16_user} -d ${POSTGRES_DB:-e16_lms}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-e16_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-e16_lms}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - E16_SEED_PASSWORD=${E16_SEED_PASSWORD:-demo-password}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - RATELIMIT_STORAGE_URI=${RATELIMIT_STORAGE_URI:-memory://}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-True}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/static/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
