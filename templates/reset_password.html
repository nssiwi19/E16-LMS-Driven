{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div class="brand-icon" style="margin: 0 auto 16px; width: 40px; height: 40px; border-radius: 10px;"></div>
      <h1>Đặt lại mật khẩu</h1>
      <p>Vui lòng nhập mật khẩu mới của bạn.</p>
    </div>
    <form method="post" class="form-group">
      <div class="form-group">
        <label>Mật khẩu mới</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Cập nhật mật khẩu</button>
    </form>
  </div>
</div>
{% endblock %}
