{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div class="brand-icon" style="margin: 0 auto 16px; width: 40px; height: 40px; border-radius: 10px;"></div>
      <h1>Quên mật khẩu?</h1>
      <p>Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>
    </div>
    <form method="post" class="form-group">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email của bạn</label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Gửi yêu cầu</button>
    </form>
    <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
      Quay lại <a href="{{ url_for('auth.login') }}" style="color: var(--primary);">Đăng nhập</a>
    </div>
  </div>
</div>
{% endblock %}
