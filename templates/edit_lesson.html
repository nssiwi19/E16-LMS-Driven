{% extends "base.html" %}
{% block content %}
<header class="top-header">
  <div>
    <a href="{{ url_for('teacher.manage_lessons', course_id=course.id) }}" class="btn btn-outline btn-sm" style="margin-bottom: 12px;">&larr; Quay lại</a>
    <h1>Sửa bài học</h1>
    <p>Cập nhật nội dung cho bài học trong khóa "{{ course.title }}".</p>
  </div>
</header>

<div class="card" style="max-width: 600px; margin: 0 auto;">
  <form action="{{ url_for('teacher.edit_lesson', course_id=course.id, lesson_id=lesson.id) }}" method="post" class="form-group">
    <div class="form-group">
      <label>Tên bài học</label>
      <input type="text" name="title" value="{{ lesson.title }}" required>
    </div>
    <div class="form-group">
      <label>Video URL (YouTube/Vimeo)</label>
      <input type="url" name="video_url" value="{{ lesson.video_url }}">
    </div>
    <div class="form-group">
      <label>Document URL</label>
      <input type="url" name="document_url" value="{{ lesson.document_url }}">
    </div>
    <div style="display: flex; gap: 12px; margin-top: 20px;">
      <button type="submit" class="btn btn-primary" style="flex: 1;">Lưu thay đổi</button>
      <a href="{{ url_for('teacher.manage_lessons', course_id=course.id) }}" class="btn btn-outline" style="flex: 1; text-align: center;">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
