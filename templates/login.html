{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div class="brand-icon" style="margin: 0 auto 16px; width: 40px; height: 40px; border-radius: 10px;"></div>
      <h1>Chào mừng trở lại</h1>
      <p>Đăng nhập để tiếp tục học tập</p>
    </div>
    <form method="post" class="form-group">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label style="display: flex; justify-content: space-between;">
          <span>Mật khẩu</span>
          <a href="{{ url_for('auth.forgot_password') }}" style="font-size: 0.8rem; color: var(--primary);">Quên mật khẩu?</a>
        </label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Đăng nhập</button>
    </form>

    <div style="margin: 24px 0; position: relative; text-align: center;">
      <hr style="border: none; border-top: 1px solid var(--card-border);">
      <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-soft); padding: 0 10px; font-size: 0.8rem; color: var(--text-muted);">Hoặc</span>
    </div>

    <a href="{{ url_for('auth.google_login') }}" class="btn btn-outline" style="width: 100%;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px;">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Tiếp tục với Google
    </a>

    <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
      Chưa có tài khoản? <a href="{{ url_for('auth.register') }}" style="color: var(--primary);">Đăng ký ngay</a>
    </div>
  </div>
</div>
{% endblock %}
