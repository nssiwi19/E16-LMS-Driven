{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div class="brand-icon" style="margin: 0 auto 16px; width: 40px; height: 40px; border-radius: 10px;"></div>
      <h1>Chào mừng trở lại</h1>
      <p>Đăng nhập để tiếp tục học tập</p>
    </div>
    <form method="post" class="form-group">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label style="display: flex; justify-content: space-between;">
          <span>Mật khẩu</span>
          <a href="{{ url_for('auth.forgot_password') }}" style="font-size: 0.8rem; color: var(--primary);">Quên mật khẩu?</a>
        </label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Đăng nhập</button>
    </form>

    <div style="margin: 24px 0; position: relative; text-align: center;">
      <hr style="border: none; border-top: 1px solid var(--card-border);">
      <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-soft); padding: 0 10px; font-size: 0.8rem; color: var(--text-muted);">Hoặc</span>
    </div>

      Tiếp tục với Google
    </a>

    <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
      Chưa có tài khoản? <a href="{{ url_for('auth.register') }}" style="color: var(--primary);">Đăng ký ngay</a>
    </div>
  </div>
</div>
{% endblock %}
