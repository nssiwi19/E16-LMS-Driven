{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div class="brand-icon" style="margin: 0 auto 16px; width: 40px; height: 40px; border-radius: 10px;"></div>
      <h1>Chào mừng trở lại</h1>
      <p>Đăng nhập để tiếp tục học tập</p>
    </div>
    <form method="post" class="form-group">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label style="display: flex; justify-content: space-between;">
          <span>Mật khẩu</span>
          <a href="{{ url_for('auth.forgot_password') }}" style="font-size: 0.8rem; color: var(--primary);">Quên mật khẩu?</a>
        </label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Đăng nhập</button>
    </form>

    <div style="margin: 24px 0; position: relative; text-align: center;">
      <hr style="border: none; border-top: 1px solid var(--card-border);">
      <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-soft); padding: 0 10px; font-size: 0.8rem; color: var(--text-muted);">Hoặc</span>
    </div>

    <a href="{{ url_for('auth.oauth_login', name='google') }}" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Tiếp tục với Google
    </a>

    <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
      Chưa có tài khoản? <a href="{{ url_for('auth.register') }}" style="color: var(--primary);">Đăng ký ngay</a>
    </div>
  </div>
</div>
{% endblock %}
