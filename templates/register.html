{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px;">
      <div class="brand-icon" style="margin: 0 auto 16px; width: 40px; height: 40px; border-radius: 10px;"></div>
      <h1>Tạo tài khoản mới</h1>
      <p>Bắt đầu hành trình học tập tại E16</p>
    </div>
    <form method="post" class="form-group">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label>Số điện thoại</label>
        <input type="tel" name="phone" placeholder="0912345678">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label>Vai trò</label>
        <select name="role">
          <option value="student">Học viên</option>
          <option value="teacher">Giáo viên</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 12px;">Đăng ký</button>
    </form>
    <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted);">
      Đã có tài khoản? <a href="{{ url_for('auth.login') }}" style="color: var(--primary);">Đăng nhập</a>
    </div>
  </div>
</div>
{% endblock %}
